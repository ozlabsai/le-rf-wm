defaults:
  - _self_
  - data: rf

output_model_name: lewm_rf
subdir: ${hydra:job.id}

num_workers: 6
seed: 3072

trainer:
  max_epochs: 100
  devices: auto
  accelerator: auto
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

wandb:
  enabled: True
  config:
    entity: lewm
    project: lewm-rf
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: False

encoder:
  in_channels: 2
  freq_bins: 256
  time_bins: 51
  patch_freq: 16
  patch_time: 3
  hidden_dim: 192
  depth: 12
  heads: 3
  mlp_dim: 768
  dim_head: 64
  dropout: 0.0

wm:
  history_size: 3
  num_preds: 2
  embed_dim: 192

predictor:
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

loss:
  sigreg:
    weight: 0.10          # used when schedule=constant
    schedule: linear      # constant | linear
    weight_start: 0.0     # linear schedule: starting weight at epoch 0
    weight_end: 0.10      # linear schedule: target weight after warmup
    warmup_epochs: 10     # linear schedule: epochs to reach weight_end
    kwargs:
      knots: 17
      num_proj: 1024
